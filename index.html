<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورشة أيوب - النظام السحابي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --text: #2d3436; --accent: #0984e3; --border: #dfe6e9; --today: #fff9db; --danger: #d63031; --success: #00b894; }
        [data-theme="dark"] { --bg: #2d3436; --card: #353b48; --text: #f5f6fa; --accent: #45aaf2; --border: #4b4b4b; --today: #485460; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; transition: 0.3s; }
        .container { max-width: 500px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .card { background: var(--card); padding: 15px; border-radius: 18px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid var(--border); }
        .worker-title { text-align: center; font-size: 26px; font-weight: 900; color: var(--accent); margin: 5px 0 10px 0; border-bottom: 2px solid var(--accent); padding-bottom: 5px; }
        .manual-entry { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; background: rgba(0,0,0,0.02); padding: 10px; border-radius: 12px; }
        .manual-entry label { font-size: 11px; display: block; margin-bottom: 3px; font-weight: bold; text-align: center; }
        .week-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: var(--accent); color: white; padding: 8px; border-radius: 10px; }
        .nav-btn { background: rgba(255,255,255,0.25); border: none; color: white; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .worker-item { display: flex; justify-content: space-between; align-items: center; padding: 18px; border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; background: var(--card); cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 15px; margin-top: 5px; }
        .btn-main { background: var(--accent); color: white; }
        .btn-share { background: #6c5ce7; color: white; }
        input { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); text-align: center; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid var(--border); padding: 5px; text-align: center; font-size: 12px; }
        .today-row { background-color: var(--today) !important; font-weight: bold; }
        .final-box { margin-top: 15px; padding: 12px; border-radius: 12px; text-align: center; border: 2px solid var(--accent); background: rgba(9, 132, 227, 0.05); }
        .final-amount { font-size: 24px; font-weight: 900; }
        .pos { color: var(--success); } .neg { color: var(--danger); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="status" style="font-size: 10px; text-align: center; padding: 5px; opacity: 0.5;">جاري الاتصال بالسحابة...</div>

    <div id="mainPage">
        <div class="header"><h3>ورشة أيوب للألمنيوم</h3><button onclick="toggleTheme()" style="border:none; background:none; cursor:pointer; font-size:20px;">🌙</button></div>
        <div class="card">
            <input type="text" id="newWorkerName" placeholder="أدخل اسم العامل الجديد...">
            <button class="btn btn-main" onclick="addWorker()">+ إضافة عامل جديد</button>
        </div>
        <div id="workersList"></div>
    </div>

    <div id="detailsPage" class="hidden">
        <div id="adminControls">
            <button class="btn" style="background:#636e72; color:white; width:auto; padding:8px 20px; font-size:12px;" onclick="showMain()">← رجوع للقائمة</button>
        </div>
        
        <h2 id="currentWorkerTitle" class="worker-title">...</h2>

        <div class="manual-entry">
            <div><label class="pos">حق له سابق (+)</label><input type="number" id="manualHaq" onchange="updateManual()"></div>
            <div><label class="neg">دين عليه سابق (-)</label><input type="number" id="manualDin" onchange="updateManual()"></div>
        </div>

        <div class="week-nav">
            <button class="nav-btn" onclick="changeWeek(-1)">◀ السابق</button>
            <span id="weekLabel">الأسبوع الحالي</span>
            <button class="nav-btn" onclick="changeWeek(1)">التالي ▶</button>
        </div>

        <div class="card">
            <table>
                <thead><tr><th>اليوم</th><th>أجر</th><th>سلفة</th><th>ملاحظة</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
            
            <div class="final-box">
                <span style="font-size:11px; font-weight:bold;">الصافي النهائي:</span>
                <div id="finalResult" class="final-amount">0 د.ج</div>
            </div>

            <div id="adminActions">
                <button class="btn btn-share" style="margin-top:15px;" onclick="shareLink()">🔗 مشاركة الحساب</button>
                <button class="btn" style="background:var(--danger); color:white; margin-top:10px;" onclick="resetAccount()">🔄 تصفير الحساب</button>
                <button class="btn" style="background:transparent; color:var(--danger); border:1px solid var(--danger); font-size:11px; margin-top:10px;" onclick="deleteWorker()">حذف العامل</button>
            </div>
        </div>
    </div>
</div>
