<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورشة أيوب - نسخة العمل الميداني</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #f8f9fa; --card: #ffffff; --text: #212529; --accent: #007bff; --border: #ddd; --today-bg: rgba(255, 193, 7, 0.2); }
        [data-theme="dark"] { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #3793ff; --border: #333; --today-bg: rgba(255, 193, 7, 0.1); }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; transition: 0.3s; }
        .container { max-width: 500px; margin: auto; }
        .theme-toggle { float: left; padding: 5px 12px; cursor: pointer; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 12px; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px; border: 1px solid var(--border); }
        .status-bar { text-align:center; font-size:12px; padding: 8px; margin-bottom: 10px; border-radius: 10px; font-weight: bold; }
        .week-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: var(--accent); color: white; padding: 10px; border-radius: 10px; }
        .nav-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .worker-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; background: var(--card); cursor: pointer; font-weight: bold; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; background: var(--card); color: var(--text); text-align: center; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid var(--border); padding: 8px; text-align: center; font-size: 13px; }
        .today-row { background-color: var(--today-bg) !important; border: 2px solid #ffc107 !important; }
        .result-box { padding: 15px; border-radius: 10px; border-right: 6px solid var(--accent); margin-top: 15px; background: rgba(0,123,255,0.1); }
        .final-val { font-size: 24px; font-weight: bold; }
        .pos-amount { color: #d9534f; } .neg-amount { color: #28a745; }
        .hidden { display: none; }
        .offline-badge { background: #dc3545 !important; color: white !important; }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()">🌙 مظهر</button>
    <div style="clear: both; height: 5px;"></div>
    
    <div id="status" class="status-bar" style="background:#eee; color:#666;">⏳ جاري التحميل...</div>

    <div id="mainPage">
        <h2 style="text-align: center;">إدارة ورشة أيوب</h2>
        <div class="card">
            <input type="text" id="newWorkerName" placeholder="اسم العامل الجديد..." style="text-align: right;">
            <button class="btn" style="background:var(--accent); color:white" onclick="addWorker()">+ حفظ العامل</button>
        </div>
        <div id="workersList"></div>
    </div>

    <div id="detailsPage" class="hidden">
        <button class="btn" style="background:#6c757d; color:white; margin-bottom:10px;" onclick="showMain()">← رجوع</button>
        <div class="week-nav">
            <button class="nav-btn" onclick="changeWeek(-1)">◀ السابق</button>
            <span id="weekLabel" style="font-weight:bold;">الأسبوع الحالي</span>
            <button class="nav-btn" onclick="changeWeek(1)">التالي ▶</button>
        </div>
        <div class="card">
            <h3 id="currentWorkerTitle" style="margin:0 0 10px 0;">الحساب</h3>
            <table>
                <thead><tr><th>اليوم</th><th>أجر</th><th>سلفة</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="result-box">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span>الصافي التراكمي:</span>
                    <span id="finalResult" class="final-val">0</span>
                </div>
            </div>
            <button class="btn" style="background:#28a745; color:white; margin-top:20px;" onclick="copyWorkerLink()">🔗 نسخ رابط العامل</button>
            <button class="btn" style="background:transparent; color:#dc3545; border:1px solid #dc3545; margin-top:10px; font-size:11px;" onclick="deleteWorker()">حذف العامل</button>
        </div>
    </div>

    <div id="workerViewPage" class="hidden">
        <div class="week-nav">
            <button class="nav-btn" onclick="changeWeek(-1)">◀ السابق</button>
            <span id="viewWeekLabel" style="font-weight:bold;">الأسبوع الحالي</span>
            <button class="nav-btn" onclick="changeWeek(1)">التالي ▶</button>
        </div>
        <div class="card">
            <h2 id="viewTitle" style="text-align:center; margin-top:0;">كشف حسابك</h2>
            <table id="viewTable">
                <thead><tr><th>اليوم</th><th>أجر</th><th>سلفة</th></tr></thead>
                <tbody id="viewTableBody"></tbody>
            </table>
            <div class="result-box">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span>إجمالي مستحقاتك:</span>
                    <span id="viewFinal" class="final-val">0</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCQA5QZLrR5er6n6r1WKx2pG-PaOvdpgeg",
      authDomain: "hisab-aluminium.firebaseapp.com",
      databaseURL: "https://hisab-aluminium-default-rtdb.firebaseio.com/",
      projectId: "hisab-aluminium",
      storageBucket: "hisab-aluminium.firebasestorage.app",
      messagingSenderId: "473859049478",
      appId: "1:473859049478:web:dc9f77cb674c11ff2fdb87"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let workers = JSON.parse(localStorage.getItem('localWorkers')) || {};
    let currentId = null, weekOffset = 0;
    const days = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
    const displayOrder = ["السبت", "الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة"];

    // فحص الاتصال وتغيير الواجهة
    const statusEl = document.getElementById('status');
    db.ref('.info/connected').on('value', (snap) => {
        if (snap.val() === true) {
            statusEl.innerHTML = "✅ متصل (تمت مزامنة البيانات)";
            statusEl.className = "status-bar";
            statusEl.style.background = "#d4edda"; statusEl.style.color = "#155724";
        } else {
            statusEl.innerHTML = "⚠️ وضع عدم الاتصال (يتم الحفظ في الهاتف)";
            statusEl.className = "status-bar offline-badge";
        }
    });

    // جلب البيانات مع التخزين المحلي
    db.ref('workers').on('value', (snap) => {
        if(snap.val()){
            workers = snap.val();
            localStorage.setItem('localWorkers', JSON.stringify(workers)); // حفظ نسخة في الهاتف
            render();
        }
    });

    function getWeekId(offset = 0) {
        const d = new Date();
        d.setDate(d.getDate() + (offset * 7));
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 6 ? 0 : -1); 
        const sunday = new Date(d.setDate(diff));
        return sunday.toISOString().split('T')[0];
    }

    function toggleTheme() {
        const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        t === 'dark' ? document.body.setAttribute('data-theme', 'dark') : document.body.removeAttribute('data-theme');
        localStorage.setItem('theme', t);
    }
    if(localStorage.getItem('theme') === 'dark') document.body.setAttribute('data-theme', 'dark');

    function render() {
        const urlId = new URLSearchParams(window.location.search).get('id');
        if(urlId && workers[urlId]) renderWorkerView(urlId);
        else if(!currentId) renderWorkersList();
        else renderDetails(currentId);
    }

    function addWorker() {
        const n = document.getElementById('newWorkerName').value;
        if(!n.trim()) return;
        const newId = Date.now();
        // الحفظ في Firebase (سيعمل فورياً حتى لو كنت أوفلاين وسينتظر الإنترنت)
        db.ref('workers/' + newId).set({ name: n });
        document.getElementById('newWorkerName').value = '';
    }

    function renderWorkersList() {
        document.getElementById('mainPage').classList.remove('hidden');
        document.getElementById('detailsPage').classList.add('hidden');
        document.getElementById('workerViewPage').classList.add('hidden');
        const l = document.getElementById('workersList'); l.innerHTML = '';
        for(let id in workers) {
            l.innerHTML += `<div class="worker-item" onclick="showDetails('${id}')"><span>👤 ${workers[id].name}</span> <span>←</span></div>`;
        }
    }

    function showDetails(id) { currentId = id; weekOffset = 0; renderDetails(id); }

    function changeWeek(dir) { 
        weekOffset += dir; 
        render();
    }

    function renderDetails(id) {
        const w = workers[id]; if(!w) return;
        document.getElementById('mainPage').classList.add('hidden');
        document.getElementById('detailsPage').classList.remove('hidden');
        document.getElementById('currentWorkerTitle').innerText = w.name;
        document.getElementById('weekLabel').innerText = weekOffset === 0 ? "الأسبوع الحالي" : "أسبوع " + getWeekId(weekOffset);
        
        const weekId = getWeekId(weekOffset);
        const weekData = (w.weeks && w.weeks[weekId]) || {rs:[0,0,0,0,0,0,0], as:[0,0,0,0,0,0,0]};
        const todayName = days[new Date().getDay()];

        document.getElementById('tableBody').innerHTML = displayOrder.map((d) => {
            const isToday = (d === todayName && weekOffset === 0);
            const idx = days.indexOf(d);
            return `<tr class="${isToday ? 'today-row' : ''}">
                <td>${isToday ? '⭐ ' : ''}${d}</td>
                <td><input type="number" class="r" data-idx="${idx}" value="${weekData.rs?.[idx]||0}" oninput="updateFirebase()"></td>
                <td><input type="number" class="a" data-idx="${idx}" value="${weekData.as?.[idx]||0}" oninput="updateFirebase()"></td>
            </tr>`;
        }).join('');
        calculateTotal(w);
    }

    function updateFirebase() {
        if(!currentId) return;
        const rs = new Array(7).fill(0);
        const as = new Array(7).fill(0);
        document.querySelectorAll('.r').forEach(i => rs[i.dataset.idx] = i.value || 0);
        document.querySelectorAll('.a').forEach(i => as[i.dataset.idx] = i.value || 0);
        const weekId = getWeekId(weekOffset);
        
        // تحديث محلي فوري
        if(!workers[currentId].weeks) workers[currentId].weeks = {};
        workers[currentId].weeks[weekId] = {rs, as};
        localStorage.setItem('localWorkers', JSON.stringify(workers));
        
        // إرسال لـ Firebase
        db.ref(`workers/${currentId}/weeks/${weekId}`).update({ rs, as });
        calculateTotal(workers[currentId]);
    }

    function calculateTotal(w) {
        let total = 0;
        if(w.weeks) {
            for(let wid in w.weeks) {
                const week = w.weeks[wid];
                const rSum = (week.rs || []).reduce((a,b)=>parseFloat(a||0)+parseFloat(b||0),0);
                const aSum = (week.as || []).reduce((a,b)=>parseFloat(a||0)+parseFloat(b||0),0);
                total += (rSum - aSum);
            }
        }
        const els = [document.getElementById('finalResult'), document.getElementById('viewFinal')];
        els.forEach(el => { if(el) { el.innerText = total.toLocaleString() + " د.ج"; el.className = total > 0 ? 'final-val pos-amount' : 'final-val neg-amount'; } });
    }

    function renderWorkerView(id) {
        const w = workers[id]; if(!w) return;
        document.getElementById('mainPage').classList.add('hidden');
        document.getElementById('workerViewPage').classList.remove('hidden');
        document.getElementById('viewTitle').innerText = w.name;
        document.getElementById('viewWeekLabel').innerText = weekOffset === 0 ? "الأسبوع الحالي" : "أسبوع " + getWeekId(weekOffset);
        const weekId = getWeekId(weekOffset);
        const weekData = (w.weeks && w.weeks[weekId]) || {rs:[0,0,0,0,0,0,0], as:[0,0,0,0,0,0,0]};
        const todayName = days[new Date().getDay()];
        document.getElementById('viewTableBody').innerHTML = displayOrder.map((d)=>{
            const isToday = (d === todayName && weekOffset === 0);
            const idx = days.indexOf(d);
            return `<tr class="${isToday ? 'today-row' : ''}"><td>${isToday ? '⭐ ' : ''}${d}</td><td>${weekData.rs?.[idx]||0}</td><td>${weekData.as?.[idx]||0}</td></tr>`;
        }).join('');
        calculateTotal(w);
    }

    function copyWorkerLink() {
        const link = window.location.origin + window.location.pathname + "?id=" + currentId;
        const i = document.createElement('input'); document.body.appendChild(i); i.value = link; i.select(); document.execCommand('copy'); document.body.removeChild(i);
        alert("✅ تم نسخ الرابط!");
    }

    function deleteWorker() { if(confirm('حذف نهائي؟')) { db.ref('workers/' + currentId).remove(); showMain(); } }
    function showMain() { currentId = null; window.history.replaceState({}, '', window.location.pathname); renderWorkersList(); }
    
    // تشغيل الرندر الأولي من البيانات المحلية إذا وجدت
    render();
</script>
</body>
</html>
