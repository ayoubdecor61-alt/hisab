<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورشة أيوب - Firestore السحابي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --text: #2d3436; --accent: #0984e3; --border: #dfe6e9; --today: #fff9db; --danger: #d63031; --success: #00b894; }
        [data-theme="dark"] { --bg: #2d3436; --card: #353b48; --text: #f5f6fa; --accent: #45aaf2; --border: #4b4b4b; --today: #485460; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; transition: 0.3s; }
        .container { max-width: 500px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .card { background: var(--card); padding: 15px; border-radius: 18px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid var(--border); }
        .worker-title { text-align: center; font-size: 26px; font-weight: 900; color: var(--accent); margin: 5px 0 10px 0; border-bottom: 2px solid var(--accent); padding-bottom: 5px; }
        .manual-entry { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; background: rgba(0,0,0,0.02); padding: 10px; border-radius: 12px; }
        .manual-entry label { font-size: 11px; display: block; margin-bottom: 3px; font-weight: bold; text-align: center; }
        .week-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: var(--accent); color: white; padding: 8px; border-radius: 10px; }
        .nav-btn { background: rgba(255,255,255,0.25); border: none; color: white; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .worker-item { display: flex; justify-content: space-between; align-items: center; padding: 18px; border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; background: var(--card); cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 15px; margin-top: 5px; }
        .btn-main { background: var(--accent); color: white; }
        .btn-share { background: #6c5ce7; color: white; }
        input { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); text-align: center; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid var(--border); padding: 5px; text-align: center; font-size: 12px; }
        .today-row { background-color: var(--today) !important; font-weight: bold; }
        .final-box { margin-top: 15px; padding: 12px; border-radius: 12px; text-align: center; border: 2px solid var(--accent); background: rgba(9, 132, 227, 0.05); }
        .final-amount { font-size: 24px; font-weight: 900; }
        .pos { color: var(--success); } .neg { color: var(--danger); }
        .hidden { display: none !important; }
        #status-bar { font-size: 10px; text-align: center; padding: 5px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div id="status-bar">جاري المزامنة...</div>
    <div id="mainPage">
        <div class="header"><h3>ورشة أيوب للألمنيوم</h3><button onclick="toggleTheme()" style="border:none; background:none; cursor:pointer; font-size:20px;">🌙</button></div>
        <div class="card">
            <input type="text" id="newWorkerName" placeholder="أدخل اسم العامل الجديد...">
            <button class="btn btn-main" onclick="addWorker()">+ إضافة عامل جديد</button>
        </div>
        <div id="workersList"></div>
    </div>

    <div id="detailsPage" class="hidden">
        <div id="adminControls">
            <button class="btn" style="background:#636e72; color:white; width:auto; padding:8px 20px; font-size:12px;" onclick="showMain()">← رجوع للقائمة</button>
        </div>
        
        <h2 id="currentWorkerTitle" class="worker-title">...</h2>
        <div class="manual-entry">
            <div><label class="pos">حق له سابق (+)</label><input type="number" id="manualHaq" onchange="updateManual()" placeholder="0"></div>
            <div><label class="neg">دين عليه سابق (-)</label><input type="number" id="manualDin" onchange="updateManual()" placeholder="0"></div>
        </div>
        <div class="week-nav">
            <button class="nav-btn" onclick="changeWeek(-1)">◀ السابق</button>
            <span id="weekLabel">الأسبوع الحالي</span>
            <button class="nav-btn" onclick="changeWeek(1)">التالي ▶</button>
        </div>
        <div class="card">
            <table>
                <thead><tr><th>اليوم</th><th>أجر</th><th>سلفة</th><th>ملاحظة</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
            
            <div class="final-box">
                <span style="font-size:11px; font-weight:bold;">الصافي النهائي:</span>
                <div id="finalResult" class="final-amount">0 د.ج</div>
            </div>
            <div id="adminActions">
                <button class="btn btn-share" style="margin-top:15px;" onclick="shareLink()">🔗 مشاركة الحساب</button>
                <button class="btn" style="background:var(--danger); color:white; margin-top:10px;" onclick="resetAccount()">🔄 تصفير الحساب</button>
                <button class="btn" style="background:transparent; color:var(--danger); border:1px solid var(--danger); font-size:11px; margin-top:10px;" onclick="deleteWorker()">حذف العامل</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCQA5QZLrR5er6n6r1WKx2pG-PaOvdpgeg",
      authDomain: "hisab-aluminium.firebaseapp.com",
      projectId: "hisab-aluminium",
      storageBucket: "hisab-aluminium.firebasestorage.app",
      messagingSenderId: "473859049478",
      appId: "1:473859049478:web:dc9f77cb674c11ff2fdb87"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // تفعيل العمل بدون إنترنت (Offline Persistence)
    db.enablePersistence().catch((err) => {
        console.error("Persistence failed", err.code);
    });

    let workers = {}, currentId = null, weekOffset = 0, isViewOnly = false;
    const days = ["السبت", "الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة"];

    const urlParams = new URLSearchParams(window.location.search);
    const viewId = urlParams.get('view');
    if(viewId) { currentId = viewId; isViewOnly = true; }

    // جلب البيانات من Firestore
    db.collection("workers").onSnapshot((snapshot) => {
        workers = {};
        snapshot.forEach((doc) => {
            workers[doc.id] = doc.data();
        });
        document.getElementById('status-bar').innerHTML = snapshot.metadata.fromCache ? "⚠️ أوفلاين (سيتم الرفع لاحقاً)" : "✅ متصل وسحابي";
        render();
    });

    function render() {
        if(isViewOnly) {
            document.getElementById('mainPage').classList.add('hidden');
            document.getElementById('detailsPage').classList.remove('hidden');
            document.getElementById('adminControls').classList.add('hidden');
            document.getElementById('adminActions').classList.add('hidden');
            renderDetails(currentId);
        } else if (!currentId) {
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('detailsPage').classList.add('hidden');
            renderList();
        } else {
            document.getElementById('mainPage').classList.add('hidden');
            document.getElementById('detailsPage').classList.remove('hidden');
            renderDetails(currentId);
        }
    }

    function renderList() {
        const list = document.getElementById('workersList');
        list.innerHTML = '';
        for (let id in workers) {
            const div = document.createElement('div');
            div.className = 'worker-item';
            div.onclick = () => { currentId = id; weekOffset = 0; render(); };
            div.innerHTML = `<span>👤 ${workers[id].name}</span> <span>←</span>`;
            list.appendChild(div);
        }
    }

    function renderDetails(id) {
        const w = workers[id];
        if(!w) return;
        document.getElementById('currentWorkerTitle').innerText = w.name;

        const mH = document.getElementById('manualHaq');
        const mD = document.getElementById('manualDin');
        mH.value = (w.manualHaq || 0) === 0 ? '' : w.manualHaq;
        mD.value = (w.manualDin || 0) === 0 ? '' : w.manualDin;
        if(isViewOnly) { mH.disabled = true; mD.disabled = true; }

        document.getElementById('weekLabel').innerText = weekOffset === 0 ? "الأسبوع الحالي" : (weekOffset > 0 ? `بعد ${weekOffset} أسابيع` : `منذ ${Math.abs(weekOffset)} أسابيع`);

        const weekId = getWeekId(weekOffset);
        const weekData = (w.weeks && w.weeks[weekId]) || { rs: Array(7).fill(0), as: Array(7).fill(0), notes: Array(7).fill("") };

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const todayIndex = (new Date().getDay() + 1) % 7; 

        days.forEach((dayName, idx) => {
            const r = weekData.rs[idx] || 0;
            const a = weekData.as[idx] || 0;
            const n = weekData.notes[idx] || "";
            const tr = document.createElement('tr');
            if (idx === todayIndex && weekOffset === 0) tr.className = 'today-row';

            if(isViewOnly) {
                tr.innerHTML = `<td>${dayName}</td><td class="pos">${r}</td><td class="neg">${a}</td><td>${n}</td>`;
            } else {
                tr.innerHTML = `
                    <td>${dayName}</td>
                    <td><input type="number" value="${r || ''}" placeholder="0" onchange="updateVal('${weekId}', ${idx}, 'rs', this.value)"></td>
                    <td><input type="number" value="${a || ''}" placeholder="0" onchange="updateVal('${weekId}', ${idx}, 'as', this.value)"></td>
                    <td><input type="text" value="${n}" onchange="updateVal('${weekId}', ${idx}, 'notes', this.value)"></td>`;
            }
            tbody.appendChild(tr);
        });
        calculateTotal(w);
    }

    function updateVal(weekId, idx, type, val) {
        const w = workers[currentId];
        let updatedWeeks = w.weeks || {};
        if (!updatedWeeks[weekId]) updatedWeeks[weekId] = { rs: Array(7).fill(0), as: Array(7).fill(0), notes: Array(7).fill("") };
        
        if (type === 'notes') updatedWeeks[weekId][type][idx] = val || "";
        else updatedWeeks[weekId][type][idx] = parseFloat(val) || 0;

        db.collection("workers").doc(currentId).update({ weeks: updatedWeeks });
    }

    function updateManual() {
        db.collection("workers").doc(currentId).update({
            manualHaq: parseFloat(document.getElementById('manualHaq').value) || 0,
            manualDin: parseFloat(document.getElementById('manualDin').value) || 0
        });
    }

    function calculateTotal(w) {
        let total = (parseFloat(w.manualHaq) || 0) - (parseFloat(w.manualDin) || 0);
        if (w.weeks) {
            for (let wid in w.weeks) {
                const rSum = (w.weeks[wid].rs || []).reduce((a, b) => a + (parseFloat(b) || 0), 0);
                const aSum = (w.weeks[wid].as || []).reduce((a, b) => a + (parseFloat(b) || 0), 0);
                total += (rSum - aSum);
            }
        }
        document.getElementById('finalResult').innerText = total.toLocaleString() + " د.ج";
        document.getElementById('finalResult').className = 'final-amount ' + (total >= 0 ? 'pos' : 'neg');
    }

    function addWorker() {
        const name = document.getElementById('newWorkerName').value.trim();
        if (name) {
            db.collection("workers").add({ name: name, manualHaq: 0, manualDin: 0, weeks: {} });
            document.getElementById('newWorkerName').value = '';
        }
    }

    function showMain() { currentId = null; render(); }

    function shareLink() {
        const link = window.location.origin + window.location.pathname + "?view=" + currentId;
        navigator.clipboard.writeText(link).then(() => alert("✅ تم نسخ رابط المشاهدة!"));
    }

    function resetAccount() {
        if (confirm("تصفير الحساب؟")) {
            db.collection("workers").doc(currentId).update({ weeks: {}, manualHaq: 0, manualDin: 0 });
        }
    }

    function deleteWorker() {
        if (confirm("حذف العامل نهائياً؟")) {
            db.collection("workers").doc(currentId).delete();
            showMain();
        }
    }

    function getWeekId(offset = 0) {
        const d = new Date();
        d.setDate(d.getDate() + offset * 7);
        const day = d.getDay();
        const diff = (day - 6 + 7) % 7;
        d.setDate(d.getDate() - diff);
        return d.toISOString().split('T')[0];
    }

    function changeWeek(dir) { weekOffset += dir; render(); }
    function toggleTheme() {
        const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', t);
    }
</script>
</body>
</html>
